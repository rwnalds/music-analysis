name: Push to Replicate

on:
  push:
    branches:
      - main

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cog
        run: |
          sudo curl -o /usr/local/bin/cog -L https://github.com/replicate/cog/releases/latest/download/cog_Linux_x86_64
          sudo chmod +x /usr/local/bin/cog

      - name: Push to Replicate
        env:
          REPLICATE_CLI_TOKEN: ${{ secrets.REPLICATE_CLI_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo $REPLICATE_CLI_TOKEN | cog login --token-stdin
          cog push r8.im/rwnalds/music-flamingo

      - name: Create or update Deployment with env vars
        env:
          REPLICATE_API_KEY: ${{ secrets.REPLICATE_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          VERSION=$(curl -s -H "Authorization: Bearer $REPLICATE_API_KEY" \
            https://api.replicate.com/v1/models/rwnalds/music-flamingo/versions \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['results'][0]['id'])")

          echo "Latest version: $VERSION"

          curl -s -X PUT \
            -H "Authorization: Bearer $REPLICATE_API_KEY" \
            -H "Content-Type: application/json" \
            https://api.replicate.com/v1/deployments/rwnalds/music-flamingo \
            -d "{
              \"version\": \"$VERSION\",
              \"hardware\": \"gpu-a100-80gb\",
              \"environment_variables\": {
                \"HF_TOKEN\": \"$HF_TOKEN\"
              }
            }"
